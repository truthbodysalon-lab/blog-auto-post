name: Content Strategy Update

on:
  schedule:
    - cron: '0 2 * * 0'   # 毎週日曜 11:00 JST (= 02:00 UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run content analyzer
        run: node src/content-analyzer.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit updated strategy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content-strategy.json
          git diff --staged --quiet || git commit -m "chore: update content strategy $(date +%Y-%m-%d)"
          git push
