name: Content Strategy Update

# 毎週日曜 11:00 JST に実行
# ラッコキーワード＋あらまきじゃけ でSEOデータ収集 → content-strategy.json + keywords/cache.json 更新

on:
  schedule:
    - cron: '0 2 * * 0'   # 毎週日曜 11:00 JST (= 02:00 UTC)
  workflow_dispatch:

concurrency:
  group: strategy-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore keyword cache
        uses: actions/cache@v4
        with:
          path: keywords/cache.json
          key: keyword-cache-${{ github.run_id }}
          restore-keys: keyword-cache-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # CDNからの遅い/ハングしがちなブラウザDLを避けてaptから高速インストール
      - name: Install Chromium via apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser 2>/dev/null || sudo apt-get install -y chromium 2>/dev/null
          CHROMIUM_BIN=$(which chromium-browser 2>/dev/null || which chromium 2>/dev/null)
          echo "CHROMIUM_PATH=${CHROMIUM_BIN}" >> $GITHUB_ENV
          echo "✅ Chromium: ${CHROMIUM_BIN}"

      # Playwright の system deps のみインストール（ブラウザバイナリはapt版を使用）
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      # Step 1: ラッコキーワード相当 + あらまきじゃけ でキーワードリサーチ
      - name: Run keyword research (ラッコキーワード + あらまきじゃけ)
        run: node src/keyword-research.js
        env:
          MODE: headless
        continue-on-error: true   # 失敗してもコンテンツ分析は続行

      # Step 2: 投稿履歴分析 + Gemini トレンド調査 → content-strategy.json
      - name: Run content analyzer
        run: node src/content-analyzer.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true

      # 更新されたファイルをcommit
      - name: Commit updated strategy & cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keywords/cache.json content-strategy.json
          git diff --staged --quiet || git commit -m "chore: weekly SEO strategy update $(date +%Y-%m-%d)"
          git push

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
