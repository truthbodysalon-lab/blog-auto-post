name: SEO Strategy Weekly Update

# 毎週日曜 11:00 JST に実行
# ラッコキーワード + あらまきじゃけ + クラスターギャップ分析 + Geminiトレンド調査
# → content-strategy.json + keywords/cache.json + rankings/seo-audit-*.json 更新

on:
  schedule:
    - cron: '0 2 * * 0'   # 毎週日曜 11:00 JST (= 02:00 UTC)
  workflow_dispatch:

# cache.json / content-strategy.json をコミット/pushするため書き込み権限が必要（403対策）
permissions:
  contents: write

concurrency:
  group: strategy-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore keyword cache
        uses: actions/cache@v4
        with:
          path: keywords/cache.json
          key: keyword-cache-${{ github.run_id }}
          restore-keys: keyword-cache-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # CDNからの遅い/ハングしがちなブラウザDLを避けてaptから高速インストール
      - name: Install Chromium via apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser 2>/dev/null || sudo apt-get install -y chromium 2>/dev/null
          CHROMIUM_BIN=$(which chromium-browser 2>/dev/null || which chromium 2>/dev/null)
          echo "CHROMIUM_PATH=${CHROMIUM_BIN}" >> $GITHUB_ENV
          echo "✅ Chromium: ${CHROMIUM_BIN}"

      # Playwright の system deps のみインストール（ブラウザバイナリはapt版を使用）
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      # Step 1: ラッコキーワード相当 + あらまきじゃけ でキーワードリサーチ
      - name: Run keyword research (ラッコキーワード + あらまきじゃけ)
        run: node src/keyword-research.js
        env:
          MODE: headless
        continue-on-error: true   # 失敗してもコンテンツ分析は続行

      # Step 2: クラスターギャップ分析 + Geminiトレンド調査 → content-strategy.json 更新
      - name: Run SEO audit (クラスター分析 + トレンド)
        run: node src/seo-audit.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true

      # Step 3: 旧content-analyzerも続行（互換性維持）
      - name: Run content analyzer (旧)
        run: node src/content-analyzer.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true

      # 更新されたファイルをcommit
      - name: Commit updated strategy & cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keywords/cache.json content-strategy.json rankings/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "ℹ️ コミット対象の変更なし"
            exit 0
          fi
          git commit -m "chore: weekly SEO strategy + cluster audit $(date +%Y-%m-%d)"
          # 他ワークフローの並行pushによるnon-fast-forward rejected対策: rebaseしてリトライ
          for i in 1 2 3; do
            if git push; then
              echo "✅ push成功"
              exit 0
            fi
            echo "⚠️ push rejected — rebaseして再試行 ($i/3)"
            git pull --rebase --autostash origin main || true
          done
          echo "::error::3回試行してもpushに失敗"
          exit 1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
