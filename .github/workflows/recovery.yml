name: Blog Auto Post Recovery

on:
  workflow_run:
    workflows: ["Blog Auto Post"]
    types: [completed]

concurrency:
  group: blog-post
  cancel-in-progress: false

jobs:
  retry:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore keyword cache
        uses: actions/cache@v4
        with:
          path: keywords/cache.json
          key: keyword-cache-${{ hashFiles('keywords/cache.json') }}
          restore-keys: keyword-cache-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # CDNからの遅いダウンロードを避けてaptから高速インストール
      - name: Install Chromium via apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser 2>/dev/null || sudo apt-get install -y chromium 2>/dev/null
          CHROMIUM_BIN=$(which chromium-browser 2>/dev/null || which chromium 2>/dev/null)
          echo "CHROMIUM_PATH=${CHROMIUM_BIN}" >> $GITHUB_ENV

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Retry batch (FORCE)
        run: node src/batch.js
        env:
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          ADMIN_LOGIN_ID: ${{ secrets.ADMIN_LOGIN_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEFAULT_CATEGORY: 整体
          MODE: headless
          SKIP_IMAGE: 'true'
          POST_COUNT: '1'
          FORCE: 'true'
          PUBLISH_NOW: 'true'

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: recovery-logs-${{ github.run_id }}
          path: |
            logs/
            debug-*.png
          retention-days: 7
