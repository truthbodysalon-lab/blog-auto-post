name: Blog Auto Post

on:
  schedule:
    # 1時間おきに1投稿ずつ — 毎日10本 (JST = UTC+9)
    - cron: '7 22 * * *'    # Slot 1:  07:07 JST
    - cron: '7 23 * * *'    # Slot 2:  08:07 JST
    - cron: '7  0 * * *'    # Slot 3:  09:07 JST
    - cron: '7  1 * * *'    # Slot 4:  10:07 JST
    - cron: '7  2 * * *'    # Slot 5:  11:07 JST
    - cron: '7  3 * * *'    # Slot 6:  12:07 JST
    - cron: '7  4 * * *'    # Slot 7:  13:07 JST
    - cron: '7  5 * * *'    # Slot 8:  14:07 JST
    - cron: '7  6 * * *'    # Slot 9:  15:07 JST
    - cron: '7  7 * * *'    # Slot 10: 16:07 JST
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20      # apt Chromium + 1本投稿 = 10分以内

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore keyword cache
        uses: actions/cache@v4
        with:
          path: keywords/cache.json
          key: keyword-cache-${{ hashFiles('keywords/cache.json') }}
          restore-keys: keyword-cache-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # CDNからの遅いダウンロードを避けてaptから高速インストール
      - name: Install Chromium via apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser 2>/dev/null || sudo apt-get install -y chromium 2>/dev/null
          CHROMIUM_BIN=$(which chromium-browser 2>/dev/null || which chromium 2>/dev/null)
          echo "CHROMIUM_PATH=${CHROMIUM_BIN}" >> $GITHUB_ENV
          echo "✅ Chromium: ${CHROMIUM_BIN}"

      # Playwright の system deps のみインストール（ブラウザバイナリはapt版を使用）
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Run batch (1投稿)
        run: node src/batch.js
        env:
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          ADMIN_LOGIN_ID: ${{ secrets.ADMIN_LOGIN_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEFAULT_CATEGORY: 整体
          MODE: headless
          SKIP_IMAGE: 'true'
          POST_COUNT: '1'
          FORCE: 'true'
          PUBLISH_NOW: 'true'

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            logs/
            debug-*.png
          retention-days: 7
