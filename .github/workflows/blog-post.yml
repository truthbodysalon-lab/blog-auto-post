name: Blog Auto Post

on:
  schedule:
    - cron: '57 10 * * *'   # 毎日 19:57 JST (= 10:57 UTC) メイン実行
    - cron: '05 04 * * *'   # 毎日 13:05 JST (= 04:05 UTC) リカバリー実行（当日未完了なら再実行）
  workflow_dispatch:         # 手動実行ボタン

concurrency:
  group: blog-post
  cancel-in-progress: false  # 実行中のジョブをキャンセルしない（二重起動防止）

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore keyword cache
        uses: actions/cache@v4
        with:
          path: keywords/cache.json
          key: keyword-cache-${{ hashFiles('keywords/cache.json') }}
          restore-keys: keyword-cache-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run batch
        run: node src/batch.js
        env:
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          ADMIN_LOGIN_ID: ${{ secrets.ADMIN_LOGIN_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GSC_SITE_URL: https://body-salon-truth.com/
          DEFAULT_CATEGORY: 整体
          SNS_FACEBOOK: 'true'
          SNS_TWITTER: 'true'
          MODE: headless
          SKIP_IMAGE: 'true'

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            logs/
            debug-*.png
          retention-days: 7
