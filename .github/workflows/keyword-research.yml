name: Keyword Research

on:
  schedule:
    - cron: '33 09 * * 0'   # 毎週日曜 18:33 JST (= 09:33 UTC)
  workflow_dispatch:

# cache.json をコミット/pushするため書き込み権限が必要（403対策）
permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # CDNからの遅い/ハングしがちなブラウザDLを避けてaptから高速インストール
      - name: Install Chromium via apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser 2>/dev/null || sudo apt-get install -y chromium 2>/dev/null
          CHROMIUM_BIN=$(which chromium-browser 2>/dev/null || which chromium 2>/dev/null)
          echo "CHROMIUM_PATH=${CHROMIUM_BIN}" >> $GITHUB_ENV
          echo "✅ Chromium: ${CHROMIUM_BIN}"

      # Playwright の system deps のみインストール（ブラウザバイナリはapt版を使用）
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Run keyword research
        run: node src/keyword-research.js
        env:
          GSC_SITE_URL: https://body-salon-truth.com/
          MODE: headless

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keywords/cache.json
          git diff --staged --quiet || git commit -m "chore: update keyword cache"
          git push
