name: Keyword Research

on:
  schedule:
    - cron: '33 09 * * 0'   # 毎週日曜 18:33 JST (= 09:33 UTC)
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run keyword research
        run: node src/keyword-research.js
        env:
          GSC_SITE_URL: https://body-salon-truth.com/
          MODE: headless

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keywords/cache.json
          git diff --staged --quiet || git commit -m "chore: update keyword cache"
          git push
